[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "news-aggregator-pack"
version = "1.0.0"
description = "Aggregate and parse news from RSS/Atom feeds."
requires-python = ">=3.10"
license = "MIT"
dependencies = ["feedparser>=6.0", "httpx>=0.25"]

[tool.setuptools.packages.find]
where = ["src"]
