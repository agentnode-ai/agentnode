manifest_version: "0.1"
package_id: "powerpoint-generator-pack"
package_type: "toolpack"
name: "Powerpoint Generator Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Generate PowerPoint presentations with proper layouts"
description: "Generate PowerPoint presentations with proper layouts"
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "powerpoint_generator_pack.tool"

capabilities:
  tools:
    - name: "document_parsing"
      capability_id: "document_parsing"
      description: "Create a PowerPoint presentation from a list of slide definitions."
      input_schema:
        type: "object"
        properties:
          slides: {type: "array"}
          output_path: {type: "string", default: ""}
          title: {type: "string", default: "Presentation"}
        required: ['slides']
  resources: []
  prompts: []

tags: ["powerpoint", "generator"]
categories: ["document-processing"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "python-pptx>=0.6.21"

permissions:
  network: {level: "none"}
  filesystem: {level: "workspace_write"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["document_parsing"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "document_parsing"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/powerpoint-generator-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
