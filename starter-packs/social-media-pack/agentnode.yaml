manifest_version: "0.1"
package_id: "social-media-pack"
package_type: "toolpack"
name: "Social Media Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Post to and read from social media platforms (Twitter, LinkedIn)."
description: "Post to and read from social media platforms (Twitter, LinkedIn)."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "social_media_pack.tool"

capabilities:
  tools:
    - name: "email_drafting"
      capability_id: "email_drafting"
      description: "Post to or read from social media platforms."
      input_schema:
        type: "object"
        properties:
          platform: {type: "string"}
          token: {type: "string"}
          operation: {type: "string"}
        required: ['platform', 'token', 'operation']
  resources: []
  prompts: []

tags: ["social", "media"]
categories: ["communication"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "httpx>=0.25"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["email_drafting"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "email_drafting"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/social-media-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
