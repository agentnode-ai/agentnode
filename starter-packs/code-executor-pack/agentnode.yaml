manifest_version: "0.1"
package_id: "code-executor-pack"
package_type: "toolpack"
name: "Code Executor Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Execute Python code in a sandboxed subprocess with timeout and memory limits."
description: "Execute Python code in a sandboxed subprocess with timeout and memory limits."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "code_executor_pack.tool"

capabilities:
  tools:
    - name: "code_analysis"
      capability_id: "code_analysis"
      description: "Execute code in a subprocess with timeout and capture output."
      input_schema:
        type: "object"
        properties:
          code: {type: "string"}
          language: {type: "string", default: "python"}
          timeout: {type: "integer", default: 30}
        required: ['code']
  resources: []
  prompts: []

tags: ["code", "executor"]
categories: ["development"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "shell"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["code_analysis"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "code_analysis"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/code-executor-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
