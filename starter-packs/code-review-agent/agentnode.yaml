manifest_version: "0.2"
package_id: "code-review-agent"
package_type: "agent"
name: "Code Review Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Perform comprehensive code review: lint, security audit, and refactoring suggestions."
description: |
  Review code by running linting, security checks, and suggesting refactorings.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "code_review_agent.agent"

capabilities:
  tools:
    - name: "code_review"
      capability_id: "code_review"
      description: "Perform comprehensive code review: lint, security audit, and refactoring suggestions."
      entrypoint: "code_review_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "code_review_agent.agent:run"
  goal: "Review code by running linting, security checks, and suggesting refactorings."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "code-review", "security", "quality", "developer"]
categories: ["development"]
