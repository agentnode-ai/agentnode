manifest_version: "0.2"
package_id: "newsletter-agent"
package_type: "agent"
name: "Newsletter Agent"
publisher: "agentnode"
version: "3.0.0"
summary: "Draft engaging newsletter emails on any topic, using LLM reasoning."
description: |
  Create engaging newsletter content

  LLM-only agent (tier: llm_only). Uses the user's LLM for reasoning.
  System prompt defines the agent's role and behavior.
  No external tools or data sources required.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "newsletter_agent.agent"

capabilities:
  tools:
    - name: "newsletter"
      capability_id: "newsletter"
      description: "Draft engaging newsletter emails on any topic, using LLM reasoning."
      entrypoint: "newsletter_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "newsletter_agent.agent:run"
  goal: "Create engaging newsletter content"
  tier: "llm_only"
  system_prompt: |
    You are a newsletter editor and content curator.
    Create engaging, scannable newsletter emails that:
    - Open with a compelling hook or key insight
    - Present 3-5 story sections with clear headlines
    - Keep each section concise (2-3 sentences)
    - Use a conversational, informed tone
    - End with a call-to-action or teaser for next issue
    - Include suggested subject line
    
    Write content based on your knowledge. Be specific and informative.
    Format the newsletter as a professional email.
  llm:
    required: true
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 0
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "newsletter", "email", "content", "curation"]
categories: ["content"]
