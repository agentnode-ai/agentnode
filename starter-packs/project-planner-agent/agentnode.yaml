manifest_version: "0.2"
package_id: "project-planner-agent"
package_type: "agent"
name: "Project Planner Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Break down a project goal into user stories, tasks, and milestones with time estimates."
description: |
  Plan a project by decomposing the goal into user stories with acceptance criteria, breaking stories into tasks, estimating effort, and organizing into milestones.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "project_planner_agent.agent"

capabilities:
  tools:
    - name: "project_planning"
      capability_id: "project_planning"
      description: "Break down a project goal into user stories, tasks, and milestones with time estimates."
      entrypoint: "project_planner_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "project_planner_agent.agent:run"
  goal: "Plan a project by decomposing the goal into user stories with acceptance criteria, breaking stories into tasks, estimating effort, and organizing into milestones."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "project", "planning", "agile", "productivity"]
categories: ["productivity"]
