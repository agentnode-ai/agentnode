manifest_version: "0.2"
package_id: "spreadsheet-auditor-agent"
package_type: "agent"
name: "Spreadsheet Auditor Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Audit Excel/CSV spreadsheets for errors, duplicates, formula issues, and data inconsistencies."
description: |
  Audit a spreadsheet by checking for duplicates, data type mismatches, formula errors, missing values, and inconsistencies, then produce an audit report with fix suggestions.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "spreadsheet_auditor_agent.agent"

capabilities:
  tools:
    - name: "spreadsheet_audit"
      capability_id: "spreadsheet_audit"
      description: "Audit Excel/CSV spreadsheets for errors, duplicates, formula issues, and data inconsistencies."
      entrypoint: "spreadsheet_auditor_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "spreadsheet_auditor_agent.agent:run"
  goal: "Audit a spreadsheet by checking for duplicates, data type mismatches, formula errors, missing values, and inconsistencies, then produce an audit report with fix suggestions."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "spreadsheet", "audit", "excel", "quality"]
categories: ["data"]
