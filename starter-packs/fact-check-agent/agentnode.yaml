manifest_version: "0.2"
package_id: "fact-check-agent"
package_type: "agent"
name: "Fact Check Agent"
publisher: "agentnode"
version: "2.1.0"
summary: "Verify claims against multiple web sources and produce a fact-check verdict with evidence."
description: |
  Verify a claim by searching for supporting and contradicting evidence, then producing a verdict.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "fact_check_agent.agent"

capabilities:
  tools:
    - name: "fact_check"
      capability_id: "fact_check"
      description: "Verify claims against multiple web sources and produce a fact-check verdict with evidence."
      entrypoint: "fact_check_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "fact_check_agent.agent:run"
  goal: "Verify a claim by searching for supporting and contradicting evidence, then producing a verdict."
  system_prompt: |
    You are a fact-checking analyst.
    Verify claims by searching multiple web sources, cross-referencing
    evidence, assessing source credibility, and producing a verdict
    (confirmed/unconfirmed/false) with supporting evidence.
  tool_access:
    allowed_packages:
      - "web-search-pack"
      - "webpage-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "fact-check", "verification", "research"]
categories: ["research"]
