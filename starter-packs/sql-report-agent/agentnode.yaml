manifest_version: "0.2"
package_id: "sql-report-agent"
package_type: "agent"
name: "SQL Report Agent"
publisher: "agentnode"
version: "2.1.0"
summary: "Answer natural language questions about data by generating SQL queries."
description: |
  Translate natural language to SQL, format queries, and produce a report.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "sql_report_agent.agent"

capabilities:
  tools:
    - name: "sql_report"
      capability_id: "sql_report"
      description: "Answer natural language questions about data by generating SQL queries."
      entrypoint: "sql_report_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "sql_report_agent.agent:run"
  goal: "Translate natural language to SQL, format queries, and produce a report."
  system_prompt: |
    You are a data analyst who translates natural language to SQL.
    Understand the user's question about their data, generate
    appropriate SQL queries, explain the query logic, and present
    results in a readable format.
  tool_access:
    allowed_packages:
      - "document-summarizer-pack"
      - "sql-generator-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "restricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "sql", "database", "report", "analytics"]
categories: ["data"]
