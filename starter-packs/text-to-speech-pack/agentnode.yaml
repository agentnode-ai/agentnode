manifest_version: "0.1"
package_id: "text-to-speech-pack"
package_type: "toolpack"
name: "Text To Speech Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Convert text to speech audio using the OpenAI TTS API."
description: "Convert text to speech audio using the OpenAI TTS API."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "text_to_speech_pack.tool"

capabilities:
  tools:
    - name: "tone_adjustment"
      capability_id: "tone_adjustment"
      description: "Convert text to speech and save as an audio file."
      input_schema:
        type: "object"
        properties:
          text: {type: "string"}
          api_key: {type: "string"}
          provider: {type: "string", default: "openai"}
          voice: {type: "string", default: "alloy"}
          output_path: {type: "string", default: ""}
        required: ['text', 'api_key']
  resources: []
  prompts: []

tags: ["text", "to", "speech"]
categories: ["language"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "httpx>=0.25"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["tone_adjustment"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "tone_adjustment"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/text-to-speech-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
