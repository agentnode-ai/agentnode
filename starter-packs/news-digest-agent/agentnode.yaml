manifest_version: "0.2"
package_id: "news-digest-agent"
package_type: "agent"
name: "News Digest Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Aggregate news from multiple sources on a topic, summarize stories, and optionally translate."
description: |
  Create a news digest by aggregating articles, summarizing each, and optionally translating.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "news_digest_agent.agent"

capabilities:
  tools:
    - name: "news_digest"
      capability_id: "news_digest"
      description: "Aggregate news from multiple sources on a topic, summarize stories, and optionally translate."
      entrypoint: "news_digest_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "news_digest_agent.agent:run"
  goal: "Create a news digest by aggregating articles, summarizing each, and optionally translating."
  system_prompt: |
    You are a news aggregation and summarization specialist.
    Search multiple news sources on a given topic, deduplicate stories,
    summarize key developments, and optionally translate content.
    Produce a structured news digest.
  tool_access:
    allowed_packages:
      - "document-summarizer-pack"
      - "news-aggregator-pack"
      - "text-translator-pack"
      - "web-search-pack"
      - "webpage-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "news", "digest", "multilingual"]
categories: ["research"]
