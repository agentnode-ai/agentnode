manifest_version: "0.2"
package_id: "deployment-agent"
package_type: "agent"
name: "Deployment Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Orchestrate deployments: verify code quality, run checks, and produce a deployment checklist."
description: |
  Deploy by verifying build quality, running tests, and producing a deployment checklist.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "deployment_agent.agent"

capabilities:
  tools:
    - name: "deployment"
      capability_id: "deployment"
      description: "Orchestrate deployments: verify code quality, run checks, and produce a deployment checklist."
      entrypoint: "deployment_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "deployment_agent.agent:run"
  goal: "Deploy by verifying build quality, running tests, and producing a deployment checklist."
  system_prompt: |
    You are a deployment operations engineer.
    Orchestrate deployments by verifying code quality, running pre-deploy
    checks, validating configurations, and producing a deployment
    checklist with go/no-go recommendation.
  tool_access:
    allowed_packages:
      - "code-linter-pack"
      - "secret-scanner-pack"
      - "security-audit-pack"
      - "test-generator-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "limited_subprocess"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "deployment", "devops", "docker", "cloud"]
categories: ["ops"]
