manifest_version: "0.1"
package_id: "cloud-deploy-pack"
package_type: "toolpack"
name: "Cloud Deploy Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Deploy applications to Vercel and Railway"
description: "Deploy applications to Vercel and Railway"
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "cloud_deploy_pack.tool"

capabilities:
  tools:
    - name: "code_analysis"
      capability_id: "code_analysis"
      description: "Deploy and manage applications on cloud platforms."
      input_schema:
        type: "object"
        properties:
          platform: {type: "string"}
          token: {type: "string"}
          operation: {type: "string"}
        required: ['platform', 'token', 'operation']
  resources: []
  prompts: []

tags: ["cloud", "deploy"]
categories: ["development"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "httpx>=0.25"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["code_analysis"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "code_analysis"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/cloud-deploy-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
