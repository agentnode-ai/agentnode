manifest_version: "0.2"
package_id: "seo-research-agent"
package_type: "agent"
name: "SEO Research Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Audit a website's SEO by analyzing content, keywords, meta tags, and competitor rankings."
description: |
  Perform SEO analysis on a target URL by extracting page content, analyzing keywords and meta tags, checking competitor rankings, and producing an SEO audit report.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "seo_research_agent.agent"

capabilities:
  tools:
    - name: "seo_research"
      capability_id: "seo_research"
      description: "Audit a website's SEO by analyzing content, keywords, meta tags, and competitor rankings."
      entrypoint: "seo_research_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "seo_research_agent.agent:run"
  goal: "Perform SEO analysis on a target URL by extracting page content, analyzing keywords and meta tags, checking competitor rankings, and producing an SEO audit report."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "seo", "marketing", "analysis"]
categories: ["research"]
