manifest_version: "0.2"
package_id: "report-generator-agent"
package_type: "agent"
name: "Report Generator Agent"
publisher: "agentnode"
version: "3.0.0"
summary: "Generate structured business reports with executive summary from provided data, using LLM reasoning."
description: |
  Generate structured business reports

  LLM-only agent (tier: llm_only). Uses the user's LLM for reasoning.
  System prompt defines the agent's role and behavior.
  No external tools or data sources required.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "report_generator_agent.agent"

capabilities:
  tools:
    - name: "report_generator"
      capability_id: "report_generator"
      description: "Generate structured business reports with executive summary from provided data, using LLM reasoning."
      entrypoint: "report_generator_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "report_generator_agent.agent:run"
  goal: "Generate structured business reports"
  tier: "llm_only"
  system_prompt: |
    You are a business analyst and report writer.
    Generate clear, structured reports that include:
    - Executive summary (2-3 key takeaways)
    - Data analysis and insights
    - Key metrics and trends
    - Recommendations
    - Conclusion
    
    Use professional business language. Support claims with reasoning.
    Structure reports with clear headers and bullet points.
    Format as markdown.
  llm:
    required: true
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 0
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "report", "data", "analytics", "business"]
categories: ["content"]
