[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "markdown-notes-pack"
version = "1.0.0"
description = "Manage a local vault of Markdown notes with YAML frontmatter and tag support."
requires-python = ">=3.10"
license = "MIT"
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
