manifest_version: "0.2"
package_id: "social-media-agent"
package_type: "agent"
name: "Social Media Agent"
publisher: "agentnode"
version: "3.1.2"
summary: "Create platform-optimized social media posts with copy and hashtags, using LLM reasoning."
description: |
  Generate platform-specific social media content

  LLM-only agent (tier: llm_only). Uses the user's LLM for reasoning.
  System prompt defines the agent's role and behavior.
  No external tools or data sources required.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "social_media_agent.agent"

capabilities:
  tools:
    - name: "social_media"
      capability_id: "social_media"
      description: "Create platform-optimized social media posts with copy and hashtags, using LLM reasoning."
      entrypoint: "social_media_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "social_media_agent.agent:run"
  goal: "Generate platform-specific social media content"
  tier: "llm_only"
  system_prompt: |
    You are a social media content strategist and copywriter.
    Create platform-optimized posts that:
    - Match each platform's tone and constraints
    - Twitter/X: witty, concise, max 280 chars, relevant hashtags
    - LinkedIn: professional, insightful, thought-leadership angle
    - Instagram: visual-friendly caption, casual tone, hashtag groups
    - Include engagement hooks (questions, CTAs)
    - Focus on value and shareability
    
    Respond with a JSON object containing posts for each platform.
  llm:
    required: true
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 0
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: product_launch
        goal: "Create social media posts for a new product launch campaign"
        expected:
          required_keys: ['posts', 'done']
          done: true
          min_lengths:
            posts: 50
      - name: brand_awareness
        goal: "Write social media content to increase brand awareness for a tech startup"
        expected:
          required_keys: ['posts', 'done']
          done: true
          min_lengths:
            posts: 50

  isolation: "thread"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "social-media", "content", "marketing"]
categories: ["content"]
