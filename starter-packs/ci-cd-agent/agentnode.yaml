manifest_version: "0.2"
package_id: "ci-cd-agent"
package_type: "agent"
name: "CI/CD Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Set up and manage CI/CD pipelines: configure builds, run tests, build containers, and deploy."
description: |
  Orchestrate a CI/CD pipeline by configuring build steps, running tests, building Docker containers, pushing images, and triggering deployments.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "ci_cd_agent.agent"

capabilities:
  tools:
    - name: "cicd_orchestration"
      capability_id: "cicd_orchestration"
      description: "Set up and manage CI/CD pipelines: configure builds, run tests, build containers, and deploy."
      entrypoint: "ci_cd_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "ci_cd_agent.agent:run"
  goal: "Orchestrate a CI/CD pipeline by configuring build steps, running tests, building Docker containers, pushing images, and triggering deployments."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "limited_subprocess"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "cicd", "devops", "deployment", "docker"]
categories: ["development"]
