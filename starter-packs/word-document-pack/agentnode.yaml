manifest_version: "0.1"
package_id: "word-document-pack"
package_type: "toolpack"
name: "Word Document Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Create Word documents with headings, paragraphs, tables, and lists"
description: "Create Word documents with headings, paragraphs, tables, and lists"
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "word_document_pack.tool"

capabilities:
  tools:
    - name: "document_parsing"
      capability_id: "document_parsing"
      description: "Create a Word document from structured content blocks."
      input_schema:
        type: "object"
        properties:
          content: {type: "array"}
          output_path: {type: "string", default: ""}
          title: {type: "string", default: ""}
        required: ['content']
  resources: []
  prompts: []

tags: ["word", "document"]
categories: ["document-processing"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "python-docx>=1.0"

permissions:
  network: {level: "none"}
  filesystem: {level: "workspace_read"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["document_parsing"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "document_parsing"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/word-document-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
