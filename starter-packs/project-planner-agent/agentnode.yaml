manifest_version: "0.2"
package_id: "project-planner-agent"
package_type: "agent"
name: "Project Planner Agent"
publisher: "agentnode"
version: "3.0.0"
summary: "Break down project goals into user stories, tasks, and milestones, using LLM reasoning."
description: |
  Plan projects with structured breakdown

  LLM-only agent (tier: llm_only). Uses the user's LLM for reasoning.
  System prompt defines the agent's role and behavior.
  No external tools or data sources required.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "project_planner_agent.agent"

capabilities:
  tools:
    - name: "project_planner"
      capability_id: "project_planner"
      description: "Break down project goals into user stories, tasks, and milestones, using LLM reasoning."
      entrypoint: "project_planner_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "project_planner_agent.agent:run"
  goal: "Plan projects with structured breakdown"
  tier: "llm_only"
  system_prompt: |
    You are a senior project manager and agile coach.
    Create detailed, actionable project plans that include:
    - Clear scope definition
    - User stories in "As a [role], I want [feature], so that [benefit]" format
    - Task breakdown with effort estimates (S/M/L)
    - Milestones with dependencies
    - Risk assessment
    - Definition of Done for each milestone
    
    Use agile methodology. Be specific and practical.
    Format as markdown.
  llm:
    required: true
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 0
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "project", "planning", "agile", "productivity"]
categories: ["productivity"]
