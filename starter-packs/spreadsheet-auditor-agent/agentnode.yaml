manifest_version: "0.2"
package_id: "spreadsheet-auditor-agent"
package_type: "agent"
name: "Spreadsheet Auditor Agent"
publisher: "agentnode"
version: "2.1.0"
summary: "Audit CSV/Excel spreadsheets for errors, duplicates, and data inconsistencies."
description: |
  Audit a spreadsheet by checking for duplicates, type mismatches, and missing values.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "spreadsheet_auditor_agent.agent"

capabilities:
  tools:
    - name: "spreadsheet_auditor"
      capability_id: "spreadsheet_auditor"
      description: "Audit CSV/Excel spreadsheets for errors, duplicates, and data inconsistencies."
      entrypoint: "spreadsheet_auditor_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "spreadsheet_auditor_agent.agent:run"
  goal: "Audit a spreadsheet by checking for duplicates, type mismatches, and missing values."
  system_prompt: |
    You are a spreadsheet data quality auditor.
    Analyze CSV/Excel files for data quality issues: duplicates,
    missing values, formatting inconsistencies, outliers, and
    structural problems. Produce a data quality report.
  tool_access:
    allowed_packages:
      - "csv-analyzer-pack"
      - "document-summarizer-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "spreadsheet", "audit", "excel", "quality"]
categories: ["data"]
