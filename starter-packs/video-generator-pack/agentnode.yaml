manifest_version: "0.1"
package_id: "video-generator-pack"
package_type: "toolpack"
name: "Video Generator Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Generate slideshow videos from text slides"
description: "Generate slideshow videos from text slides"
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "video_generator_pack.tool"

capabilities:
  tools:
    - name: "chart_generation"
      capability_id: "chart_generation"
      description: "Generate a slideshow video from text slides."
      input_schema:
        type: "object"
        properties:
          slides: {type: "array"}
          output_path: {type: "string", default: ""}
          fps: {type: "integer", default: 1}
          width: {type: "integer", default: 1920}
          height: {type: "integer", default: 1080}
        required: ['slides']
  resources: []
  prompts: []

tags: ["video", "generator"]
categories: ["data-analysis"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "Pillow>=10.0"

permissions:
  network: {level: "none"}
  filesystem: {level: "workspace_write"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["chart_generation"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "chart_generation"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/video-generator-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
