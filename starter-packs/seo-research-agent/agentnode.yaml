manifest_version: "0.2"
package_id: "seo-research-agent"
package_type: "agent"
name: "SEO Research Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Audit a website's SEO by analyzing content, keywords, and competitor rankings."
description: |
  Perform SEO analysis by extracting page content, analyzing SEO factors, and checking competitor rankings.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "seo_research_agent.agent"

capabilities:
  tools:
    - name: "seo_research"
      capability_id: "seo_research"
      description: "Audit a website's SEO by analyzing content, keywords, and competitor rankings."
      entrypoint: "seo_research_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "seo_research_agent.agent:run"
  goal: "Perform SEO analysis by extracting page content, analyzing SEO factors, and checking competitor rankings."
  system_prompt: |
    You are an SEO research analyst.
    Audit websites for SEO factors: content quality, keyword usage,
    meta tags, page structure, competitor rankings, and backlink
    opportunities. Produce an actionable SEO report.
  tool_access:
    allowed_packages:
      - "document-summarizer-pack"
      - "seo-optimizer-pack"
      - "web-search-pack"
      - "webpage-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "seo", "marketing", "analysis"]
categories: ["research"]
