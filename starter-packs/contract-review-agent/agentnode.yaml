manifest_version: "0.2"
package_id: "contract-review-agent"
package_type: "agent"
name: "Contract Review Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Analyze legal contracts, flag risky clauses, compare against templates."
description: |
  Review a contract by extracting text, identifying risks, and suggesting amendments.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "contract_review_agent.agent"

capabilities:
  tools:
    - name: "contract_review"
      capability_id: "contract_review"
      description: "Analyze legal contracts, flag risky clauses, compare against templates."
      entrypoint: "contract_review_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "contract_review_agent.agent:run"
  goal: "Review a contract by extracting text, identifying risks, and suggesting amendments."
  tier: "llm_plus_tools"
  llm:
    required: true
  system_prompt: |
    You are a contract review specialist.
    Analyze legal contracts clause by clause, flag risky or unusual terms,
    compare against standard templates, and produce a risk assessment
    with recommended modifications.
  tool_access:
    allowed_packages:
      - "contract-review-pack"
      - "document-summarizer-pack"
      - "pdf-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: nda_review
        goal: "Review a non-disclosure agreement for potential risks"
        expected:
          required_keys: ['summary', 'done']
          done: true
      - name: saas_contract
        goal: "Analyze a SaaS subscription agreement for unfavorable terms"
        expected:
          required_keys: ['summary', 'done']
          done: true

  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "legal", "contract", "review", "compliance"]
categories: ["productivity"]
