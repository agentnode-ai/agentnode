# ──────────────────────────────────────────────────────────────
# Deploy AgentNode — SSH-based CI/CD to Hetzner
# ──────────────────────────────────────────────────────────────
#
# Required GitHub Secrets:
#   DEPLOY_SSH_KEY  — Private SSH key (ed25519/rsa) for root@server
#   DEPLOY_HOST     — Server IP address (e.g. 91.98.142.165)
#
# The workflow runs backend tests with Postgres + Redis, builds
# the Next.js frontend, packages everything, SCPs to the server,
# runs Alembic migrations, restarts systemd services, and
# verifies health via /readyz.
# ──────────────────────────────────────────────────────────────

name: Deploy AgentNode

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────
  # 1. Backend tests (Postgres + Redis service containers)
  # ──────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentnode
          POSTGRES_PASSWORD: agentnode
          POSTGRES_DB: agentnode_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://agentnode:agentnode@localhost:5432/agentnode_test
      REDIS_URL: redis://localhost:6379
      MEILISEARCH_URL: http://localhost:7700
      MEILISEARCH_KEY: masterKey
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: agentnode-artifacts
      S3_REGION: auto
      JWT_SECRET: test-secret-ci
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies (pinned from lockfile)
        # P1-CD3: CI must install from requirements.lock so it matches
        # production exactly. Dev extras (pytest, httpx, ruff) are added
        # on top without --upgrade so pinned versions win.
        run: |
          pip install -r requirements.lock
          pip install -e ".[dev]" --no-deps
          pip install pytest pytest-asyncio httpx

      - name: Run pytest
        run: pytest -v --tb=short

  # ──────────────────────────────────────────────────────
  # 2. Build Next.js frontend (standalone output)
  # ──────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      # Server-side env var — backend is co-located in production
      BACKEND_URL: http://localhost:8001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      # Next.js standalone output produces:
      #   .next/standalone/  — self-contained Node server + node_modules
      #   .next/static/      — client-side assets (must be copied into standalone)
      #   public/            — public assets (must be copied into standalone)
      - name: Prepare standalone bundle
        run: |
          cp -r .next/static .next/standalone/web/.next/static
          if [ -d public ]; then
            cp -r public .next/standalone/web/public
          fi

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: web/.next/standalone
          retention-days: 1

  # ──────────────────────────────────────────────────────
  # 3. Deploy to production server via SSH
  # ──────────────────────────────────────────────────────
  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend-build

      - name: Package release tarball
        run: |
          mkdir -p release

          # Backend: app source, alembic, configs (no .venv, no __pycache__)
          # P1-CD3: include requirements.lock so the server can install the
          # exact pinned dependency set instead of resolving transitive deps
          # from pyproject at deploy time.
          tar czf release/backend.tar.gz \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='.env' \
            --exclude='tests' \
            -C backend \
            app alembic alembic.ini pyproject.toml requirements.lock

          # Frontend: standalone build (already prepared by build-frontend job)
          tar czf release/frontend.tar.gz \
            -C frontend-build \
            .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload release to server
        run: |
          scp -i ~/.ssh/deploy_key \
            release/backend.tar.gz release/frontend.tar.gz \
            root@${{ secrets.DEPLOY_HOST }}:/tmp/

      - name: Deploy backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            BACKEND_DIR=/opt/agentnode/backend
            VENV=$BACKEND_DIR/.venv

            echo "==> Backing up current backend..."
            if [ -d "$BACKEND_DIR/app" ]; then
              cp -r "$BACKEND_DIR/app" "$BACKEND_DIR/app.bak"
            fi

            echo "==> Extracting new backend..."
            tar xzf /tmp/backend.tar.gz -C "$BACKEND_DIR"

            echo "==> Installing pinned Python dependencies from lockfile..."
            # P1-CD3: install from requirements.lock first so production gets
            # the exact same versions CI was tested against. Then install the
            # package itself --no-deps so the lock stays authoritative.
            $VENV/bin/pip install -r "$BACKEND_DIR/requirements.lock" --quiet
            $VENV/bin/pip install -e "$BACKEND_DIR" --no-deps --quiet

            echo "==> Running Alembic migrations..."
            cd "$BACKEND_DIR"
            $VENV/bin/alembic upgrade head

            echo "==> Restarting backend service..."
            systemctl restart agentnode-api

            echo "==> Cleaning up backup..."
            rm -rf "$BACKEND_DIR/app.bak"
            rm -f /tmp/backend.tar.gz

            echo "==> Backend deploy complete."

      - name: Deploy frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            WEB_DIR=/opt/agentnode/web

            echo "==> Backing up current frontend..."
            if [ -d "$WEB_DIR/.next" ]; then
              mv "$WEB_DIR/.next" "$WEB_DIR/.next.bak"
            fi

            echo "==> Extracting new frontend..."
            # Standalone build goes directly into web dir
            mkdir -p "$WEB_DIR"
            tar xzf /tmp/frontend.tar.gz -C "$WEB_DIR/standalone-build"

            # Replace the running frontend
            rm -rf "$WEB_DIR/.next"
            mv "$WEB_DIR/standalone-build/web/.next" "$WEB_DIR/.next"

            # Copy the standalone server and node_modules
            cp -r "$WEB_DIR/standalone-build/node_modules" "$WEB_DIR/standalone-node_modules" 2>/dev/null || true
            cp "$WEB_DIR/standalone-build/web/server.js" "$WEB_DIR/server.js" 2>/dev/null || true

            echo "==> Restarting frontend service..."
            systemctl restart agentnode-web

            echo "==> Cleaning up..."
            rm -rf "$WEB_DIR/.next.bak" "$WEB_DIR/standalone-build"
            rm -f /tmp/frontend.tar.gz

            echo "==> Frontend deploy complete."

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            echo "==> Waiting for backend to become healthy..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8001/readyz > /dev/null 2>&1; then
                echo "==> Backend healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "FATAL: Backend failed health check after 30s"
                echo "==> Last 50 lines of backend log:"
                journalctl -u agentnode-api --no-pager -n 50
                exit 1
              fi
              sleep 1
            done

            echo "==> Checking frontend is responding..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "==> Frontend healthy after ${i}s"
                break
              fi
              if [ "$i" -eq 15 ]; then
                echo "WARNING: Frontend not responding after 15s"
                echo "==> Last 30 lines of frontend log:"
                journalctl -u agentnode-web --no-pager -n 30
                exit 1
              fi
              sleep 1
            done

            echo "==> Deployment verified successfully."

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
