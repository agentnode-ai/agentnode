manifest_version: "0.2"
package_id: "deep-research-agent"
package_type: "agent"
name: "Deep Research Agent"
publisher: "agentnode"
version: "2.1.1"
summary: "Conduct deep multi-source research on any topic, synthesize findings into a structured report."
description: |
  Research a topic using web search, page extraction, and summarization to produce a report with sources.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "deep_research_agent.agent"

capabilities:
  tools:
    - name: "deep_research"
      capability_id: "deep_research"
      description: "Conduct deep multi-source research on any topic, synthesize findings into a structured report."
      entrypoint: "deep_research_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "deep_research_agent.agent:run"
  goal: "Research a topic using web search, page extraction, and summarization to produce a report with sources."
  system_prompt: |
    You are a deep research analyst.
    Conduct thorough multi-source research on any topic by searching the
    web, extracting page content, cross-referencing sources, and
    synthesizing findings into a comprehensive report with citations.
  tool_access:
    allowed_packages:
      - "document-summarizer-pack"
      - "web-search-pack"
      - "webpage-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "research", "analysis"]
categories: ["research"]
