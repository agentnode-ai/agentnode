manifest_version: "0.2"
package_id: "social-media-agent"
package_type: "agent"
name: "Social Media Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Create platform-optimized social media posts with copy, hashtags, and image suggestions from a topic or URL."
description: |
  Generate social media content by researching the topic, writing platform-optimized copy with hashtags, and suggesting or generating accompanying images.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "social_media_agent.agent"

capabilities:
  tools:
    - name: "social_media_content"
      capability_id: "social_media_content"
      description: "Create platform-optimized social media posts with copy, hashtags, and image suggestions from a topic or URL."
      entrypoint: "social_media_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "social_media_agent.agent:run"
  goal: "Generate social media content by researching the topic, writing platform-optimized copy with hashtags, and suggesting or generating accompanying images."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "social-media", "content", "marketing"]
categories: ["content"]
