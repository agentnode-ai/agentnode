manifest_version: "0.1"
package_id: "youtube-analyzer-pack"
package_type: "toolpack"
name: "Youtube Analyzer Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Search and analyse YouTube videos, captions, and comments via the Data API v3."
description: "Search and analyse YouTube videos, captions, and comments via the Data API v3."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "youtube_analyzer_pack.tool"

capabilities:
  tools:
    - name: "webpage_extraction"
      capability_id: "webpage_extraction"
      description: "Interact with the YouTube Data API v3."
      input_schema:
        type: "object"
        properties:
          api_key: {type: "string"}
          operation: {type: "string"}
        required: ['api_key', 'operation']
  resources: []
  prompts: []

tags: ["youtube", "analyzer"]
categories: ["web-and-browsing"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "httpx>=0.25"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["webpage_extraction"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "webpage_extraction"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/youtube-analyzer-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
