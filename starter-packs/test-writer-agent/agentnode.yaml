manifest_version: "0.2"
package_id: "test-writer-agent"
package_type: "agent"
name: "Test Writer Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Analyze source code and generate comprehensive test suites with unit tests."
description: |
  Generate tests by analyzing function signatures, creating unit tests, and validating them.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "test_writer_agent.agent"

capabilities:
  tools:
    - name: "test_writer"
      capability_id: "test_writer"
      description: "Analyze source code and generate comprehensive test suites with unit tests."
      entrypoint: "test_writer_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "test_writer_agent.agent:run"
  goal: "Generate tests by analyzing function signatures, creating unit tests, and validating them."
  tier: "llm_plus_tools"
  llm:
    required: true
  system_prompt: |
    You are a test engineering specialist.
    Analyze source code to understand functionality, then generate
    comprehensive test suites including unit tests, edge cases, and
    error scenarios. Follow testing best practices for the detected
    language and framework.
  tool_access:
    allowed_packages:
      - "code-linter-pack"
      - "code-refactor-pack"
      - "test-generator-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: python_tests
        goal: "Generate unit tests for a Python authentication module"
        expected:
          required_keys: ['tests', 'done']
          done: true
      - name: api_tests
        goal: "Write integration tests for a REST API endpoint"
        expected:
          required_keys: ['tests', 'done']
          done: true

  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "testing", "code", "quality", "developer"]
categories: ["development"]
