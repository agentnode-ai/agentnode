manifest_version: "0.2"
package_id: "technical-docs-agent"
package_type: "agent"
name: "Technical Documentation Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Generate API documentation and developer guides from source code."
description: |
  Generate documentation by analyzing code structure, extracting signatures, and formatting guides.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "technical_docs_agent.agent"

capabilities:
  tools:
    - name: "technical_docs"
      capability_id: "technical_docs"
      description: "Generate API documentation and developer guides from source code."
      entrypoint: "technical_docs_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "technical_docs_agent.agent:run"
  goal: "Generate documentation by analyzing code structure, extracting signatures, and formatting guides."
  tier: "llm_plus_tools"
  llm:
    required: true
  system_prompt: |
    You are a technical documentation engineer.
    Analyze source code to generate API documentation, developer
    guides, and usage examples. Follow documentation best practices
    for clarity, completeness, and consistency.
  tool_access:
    allowed_packages:
      - "code-linter-pack"
      - "code-refactor-pack"
      - "test-generator-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: api_docs
        goal: "Generate technical documentation for a REST API service"
        expected:
          required_keys: ['documentation', 'done']
          done: true
      - name: library_docs
        goal: "Write developer documentation for a Python utility library"
        expected:
          required_keys: ['documentation', 'done']
          done: true

  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "docs", "api", "code", "developer"]
categories: ["content"]
