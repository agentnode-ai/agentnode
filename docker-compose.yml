version: "3.9"
services:
  # P1-CD9: bind all dev services to 127.0.0.1 instead of 0.0.0.0 so a
  # developer machine on a public/coffee-shop network does not silently
  # expose Postgres / Redis / Meili / MinIO with default dev passwords.
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentnode}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentnode}
      POSTGRES_DB: ${POSTGRES_DB:-agentnode}
    ports: ["127.0.0.1:5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6379:6379"]

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey}
    ports: ["127.0.0.1:7700:7700"]
    volumes: [msdata:/meili_data]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["127.0.0.1:9000:9000", "127.0.0.1:9001:9001"]
    volumes: [miniodata:/data]

volumes:
  pgdata:
  msdata:
  miniodata:
