[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "semantic-search-pack"
version = "1.0.0"
description = "Semantic similarity search over documents using sentence-transformers."
requires-python = ">=3.10"
license = "MIT"
dependencies = ["sentence-transformers>=2.0", "numpy>=1.24"]

[tool.setuptools.packages.find]
where = ["src"]
