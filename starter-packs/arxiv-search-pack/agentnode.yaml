manifest_version: "0.1"
package_id: "arxiv-search-pack"
package_type: "toolpack"
name: "Arxiv Search Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Search and retrieve academic papers from ArXiv."
description: "Search and retrieve academic papers from ArXiv."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "arxiv_search_pack.tool"

capabilities:
  tools:
    - name: "web_search"
      capability_id: "web_search"
      description: "Search ArXiv for academic papers."
      input_schema:
        type: "object"
        properties:
          query: {type: "string"}
          max_results: {type: "integer", default: 10}
          sort_by: {type: "string", default: "relevance"}
        required: ['query']
  resources: []
  prompts: []

tags: ["arxiv", "search"]
categories: ["web-and-browsing"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "httpx>=0.25"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["web_search"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "web_search"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/arxiv-search-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
