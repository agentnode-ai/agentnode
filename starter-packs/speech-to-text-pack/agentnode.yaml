manifest_version: "0.1"
package_id: "speech-to-text-pack"
package_type: "toolpack"
name: "Speech To Text Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Transcribe audio to text using OpenAI Whisper (local or API)."
description: "Transcribe audio to text using OpenAI Whisper (local or API)."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "speech_to_text_pack.tool"

capabilities:
  tools:
    - name: "document_parsing"
      capability_id: "document_parsing"
      description: "Transcribe an audio file to text."
      input_schema:
        type: "object"
        properties:
          audio_path: {type: "string"}
          model: {type: "string", default: "base"}
          language: {type: "string"}
          api_key: {type: "string", default: ""}
        required: ['audio_path']
  resources: []
  prompts: []

tags: ["speech", "to", "text"]
categories: ["document-processing"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "httpx>=0.25"
  optional_dependencies:
    - "openai-whisper>=20231117"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["document_parsing"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "document_parsing"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/speech-to-text-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"

verification:
  fixtures:
    - name: "transcribe_audio_api"
      tool: "document_parsing"
      test_input:
        audio_path: "/workspace/fixtures/test.wav"
        api_key: "sk-fixture-test-key"
      cassette: "fixtures/cassettes/transcribe_api.yaml"
      expected:
        return_type: "dict"
        required_keys: ["text", "language", "duration", "segments"]
