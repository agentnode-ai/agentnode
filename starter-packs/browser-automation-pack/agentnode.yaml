manifest_version: "0.2"
package_id: "browser-automation-pack"
package_type: "toolpack"
name: "Browser Automation Pack"
publisher: "agentnode"
version: "1.1.0"
summary: "Automate browser interactions: screenshots, text extraction, clicks, and form filling."
runtime: python
description: "Automate browser interactions: screenshots, text extraction, clicks, and form filling."
entrypoint: "browser_automation_pack.tool"

capabilities:
  tools:
    - name: "screenshot"
      capability_id: "browser_navigation"
      entrypoint: "browser_automation_pack.tool:screenshot"
      description: "Capture a screenshot of a web page."
      input_schema:
        type: "object"
        properties:
          url: {type: "string", description: "URL to navigate to"}
          output_path: {type: "string", description: "File path for screenshot output"}
          full_page: {type: "boolean", description: "Capture full scrollable page"}
        required: ["url"]

    - name: "extract_text"
      capability_id: "web_scraping"
      entrypoint: "browser_automation_pack.tool:extract_text"
      description: "Extract text content from a web page."
      input_schema:
        type: "object"
        properties:
          url: {type: "string", description: "URL to navigate to"}
          selector: {type: "string", description: "CSS selector for targeted extraction"}
        required: ["url"]

    - name: "click"
      capability_id: "browser_navigation"
      entrypoint: "browser_automation_pack.tool:click"
      description: "Click an element on a web page."
      input_schema:
        type: "object"
        properties:
          url: {type: "string", description: "URL to navigate to"}
          selector: {type: "string", description: "CSS selector of element to click"}
        required: ["url", "selector"]

    - name: "fill"
      capability_id: "browser_navigation"
      entrypoint: "browser_automation_pack.tool:fill"
      description: "Fill a form field on a web page."
      input_schema:
        type: "object"
        properties:
          url: {type: "string", description: "URL to navigate to"}
          selector: {type: "string", description: "CSS selector of input field"}
          value: {type: "string", description: "Value to type"}
        required: ["url", "selector"]

    - name: "get_links"
      capability_id: "web_scraping"
      entrypoint: "browser_automation_pack.tool:get_links"
      description: "Extract all links from a web page."
      input_schema:
        type: "object"
        properties:
          url: {type: "string", description: "URL to navigate to"}
          selector: {type: "string", description: "CSS selector to scope the search"}
        required: ["url"]

tags: ["browser", "automation", "playwright", "web"]
categories: ["web-and-browsing"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "playwright>=1.40"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "temp"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}
