manifest_version: "0.1"
package_id: "email-drafter-pack"
package_type: "toolpack"
name: "Email Drafter Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Generate polished emails from intent and bullet points using tone-aware templates."
description: "Generate polished emails from intent and bullet points using tone-aware templates."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "email_drafter_pack.tool"

capabilities:
  tools:
    - name: "email_drafting"
      capability_id: "email_drafting"
      description: "Generate an email from intent / bullet points."
      input_schema:
        type: "object"
        properties:
          intent: {type: "string"}
          tone: {type: "string", default: "professional"}
          recipient_name: {type: "string", default: ""}
          sender_name: {type: "string", default: ""}
          format: {type: "string", default: "plain"}
        required: ['intent']
  resources: []
  prompts: []

tags: ["email", "drafter"]
categories: ["communication"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["email_drafting"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "email_drafting"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/email-drafter-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
