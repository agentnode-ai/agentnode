manifest_version: "0.2"
package_id: "blog-writer-agent"
package_type: "agent"
name: "Blog Writer Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Research a topic and write an SEO-optimized blog post with proper structure, keywords, and meta description."
description: |
  Write a complete blog post by researching the topic, structuring an outline, writing SEO-optimized content with keywords, and generating a meta description.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "blog_writer_agent.agent"

capabilities:
  tools:
    - name: "blog_writing"
      capability_id: "blog_writing"
      description: "Research a topic and write an SEO-optimized blog post with proper structure, keywords, and meta description."
      entrypoint: "blog_writer_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "blog_writer_agent.agent:run"
  goal: "Write a complete blog post by researching the topic, structuring an outline, writing SEO-optimized content with keywords, and generating a meta description."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "content", "blog", "seo", "writing"]
categories: ["content"]
