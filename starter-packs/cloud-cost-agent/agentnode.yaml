manifest_version: "0.2"
package_id: "cloud-cost-agent"
package_type: "agent"
name: "Cloud Cost Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Analyze cloud infrastructure costs, identify waste, and recommend optimizations."
description: |
  Analyze cloud costs by examining billing data and recommending optimizations.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "cloud_cost_agent.agent"

capabilities:
  tools:
    - name: "cloud_cost"
      capability_id: "cloud_cost"
      description: "Analyze cloud infrastructure costs, identify waste, and recommend optimizations."
      entrypoint: "cloud_cost_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "cloud_cost_agent.agent:run"
  goal: "Analyze cloud costs by examining billing data and recommending optimizations."
  tier: "llm_plus_tools"
  llm:
    required: true
  system_prompt: |
    You are a cloud cost optimization analyst.
    Analyze cloud infrastructure spending, identify underutilized resources,
    spot cost anomalies, and recommend concrete savings opportunities
    with estimated impact.
  tool_access:
    allowed_packages:
      - "csv-analyzer-pack"
      - "document-summarizer-pack"
      - "web-search-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: aws_costs
        goal: "Analyze AWS cloud spending and identify cost optimization opportunities"
        expected:
          required_keys: ['cost_analysis', 'done']
          done: true
      - name: azure_costs
        goal: "Review Azure resource costs and suggest budget reductions"
        expected:
          required_keys: ['cost_analysis', 'done']
          done: true

  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "restricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "cloud", "cost", "optimization", "devops"]
categories: ["ops"]
