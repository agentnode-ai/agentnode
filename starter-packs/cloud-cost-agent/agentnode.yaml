manifest_version: "0.2"
package_id: "cloud-cost-agent"
package_type: "agent"
name: "Cloud Cost Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Analyze cloud infrastructure costs across AWS/Azure, identify waste, and recommend optimization strategies."
description: |
  Analyze cloud costs by fetching billing data, identifying underutilized resources and waste, benchmarking against best practices, and recommending cost optimizations.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "cloud_cost_agent.agent"

capabilities:
  tools:
    - name: "cloud_cost_optimization"
      capability_id: "cloud_cost_optimization"
      description: "Analyze cloud infrastructure costs across AWS/Azure, identify waste, and recommend optimization strategies."
      entrypoint: "cloud_cost_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "cloud_cost_agent.agent:run"
  goal: "Analyze cloud costs by fetching billing data, identifying underutilized resources and waste, benchmarking against best practices, and recommending cost optimizations."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "restricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "cloud", "cost", "optimization", "devops"]
categories: ["ops"]
