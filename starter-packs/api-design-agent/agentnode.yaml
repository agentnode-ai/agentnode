manifest_version: "0.2"
package_id: "api-design-agent"
package_type: "agent"
name: "API Design Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Generate an OpenAPI specification from requirements, validate it, and produce API documentation."
description: |
  Design an API by converting requirements into an OpenAPI spec, validating the schema, generating documentation with examples, and checking for REST best practices.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "api_design_agent.agent"

capabilities:
  tools:
    - name: "api_design"
      capability_id: "api_design"
      description: "Generate an OpenAPI specification from requirements, validate it, and produce API documentation."
      entrypoint: "api_design_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "api_design_agent.agent:run"
  goal: "Design an API by converting requirements into an OpenAPI spec, validating the schema, generating documentation with examples, and checking for REST best practices."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "api", "openapi", "design", "developer"]
categories: ["development"]
