manifest_version: "0.2"
package_id: "dependency-audit-agent"
package_type: "agent"
name: "Dependency Audit Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Scan project dependencies for vulnerabilities, outdated versions, and leaked secrets."
description: |
  Audit dependencies by scanning for CVEs, checking versions, and detecting leaked secrets.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "dependency_audit_agent.agent"

capabilities:
  tools:
    - name: "dependency_audit"
      capability_id: "dependency_audit"
      description: "Scan project dependencies for vulnerabilities, outdated versions, and leaked secrets."
      entrypoint: "dependency_audit_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "dependency_audit_agent.agent:run"
  goal: "Audit dependencies by scanning for CVEs, checking versions, and detecting leaked secrets."
  system_prompt: |
    You are a software supply chain security auditor.
    Scan project dependencies for known vulnerabilities (CVEs), detect
    outdated packages, check for leaked secrets in configuration, and
    produce a prioritized remediation report.
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "security", "dependencies", "audit", "devops"]
categories: ["development"]
