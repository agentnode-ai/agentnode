manifest_version: "0.2"
package_id: "sql-report-agent"
package_type: "agent"
name: "SQL Report Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Answer natural language questions about a database by generating SQL queries, executing them, and visualizing results."
description: |
  Answer data questions by translating natural language to SQL, executing queries against a database, analyzing results, and generating visualizations and a summary report.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "sql_report_agent.agent"

capabilities:
  tools:
    - name: "sql_reporting"
      capability_id: "sql_reporting"
      description: "Answer natural language questions about a database by generating SQL queries, executing them, and visualizing results."
      entrypoint: "sql_report_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "sql_report_agent.agent:run"
  goal: "Answer data questions by translating natural language to SQL, executing queries against a database, analyzing results, and generating visualizations and a summary report."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "restricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "sql", "database", "report", "analytics"]
categories: ["data"]
