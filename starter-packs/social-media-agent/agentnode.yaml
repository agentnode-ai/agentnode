manifest_version: "0.2"
package_id: "social-media-agent"
package_type: "agent"
name: "Social Media Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Create platform-optimized social media posts with copy, hashtags, and suggestions."
description: |
  Generate social media content by researching trending angles and writing platform-specific copy.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "social_media_agent.agent"

capabilities:
  tools:
    - name: "social_media"
      capability_id: "social_media"
      description: "Create platform-optimized social media posts with copy, hashtags, and suggestions."
      entrypoint: "social_media_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "social_media_agent.agent:run"
  goal: "Generate social media content by researching trending angles and writing platform-specific copy."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "social-media", "content", "marketing"]
categories: ["content"]
