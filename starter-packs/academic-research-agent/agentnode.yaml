manifest_version: "0.2"
package_id: "academic-research-agent"
package_type: "agent"
name: "Academic Research Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Search academic papers on arXiv, extract content, and produce a literature review."
description: |
  Conduct academic research by searching paper databases, extracting PDFs, and summarizing into a review.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "academic_research_agent.agent"

capabilities:
  tools:
    - name: "academic_research"
      capability_id: "academic_research"
      description: "Search academic papers on arXiv, extract content, and produce a literature review."
      entrypoint: "academic_research_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "academic_research_agent.agent:run"
  goal: "Conduct academic research by searching paper databases, extracting PDFs, and summarizing into a review."
  system_prompt: |
    You are an academic research assistant.
    Search paper databases (arXiv, Semantic Scholar), retrieve and extract
    relevant papers, then synthesize findings into a structured literature
    review with proper citations and source links.
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "research", "academic", "papers"]
categories: ["research"]
