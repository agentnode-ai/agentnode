manifest_version: "0.2"
package_id: "blog-writer-agent"
package_type: "agent"
name: "Blog Writer Agent"
publisher: "agentnode"
version: "3.1.1"
summary: "Write SEO-optimized blog posts with compelling structure, using LLM reasoning."
description: |
  Write SEO-optimized blog posts

  LLM-only agent (tier: llm_only). Uses the user's LLM for reasoning.
  System prompt defines the agent's role and behavior.
  No external tools or data sources required.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "blog_writer_agent.agent"

capabilities:
  tools:
    - name: "blog_writer"
      capability_id: "blog_writer"
      description: "Write SEO-optimized blog posts with compelling structure, using LLM reasoning."
      entrypoint: "blog_writer_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "blog_writer_agent.agent:run"
  goal: "Write SEO-optimized blog posts"
  tier: "llm_only"
  system_prompt: |
    You are an expert blog writer and content strategist.
    Create engaging, well-structured blog posts with:
    - Compelling headline
    - Hook introduction that draws readers in
    - Clear H2/H3 structure for scanability
    - Actionable takeaways backed by reasoning
    - Conclusion with call-to-action
    - SEO considerations: natural keyword usage, meta description suggestion
    
    Write in a professional but approachable tone. Use concrete examples.
    Format output as markdown.
  llm:
    required: true
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 0
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  verification:
    cases:
      - name: tech_blog
        goal: "Write a blog post about Python decorators and their practical uses"
        expected:
          required_keys: ["article", "title", "done"]
          done: true
          min_lengths:
            article: 200
      - name: marketing_blog
        goal: "Write a blog post about the benefits of cloud computing for small businesses"
        expected:
          required_keys: ["article", "title", "done"]
          done: true
          min_lengths:
            article: 200

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "content", "blog", "seo", "writing"]
categories: ["content"]
