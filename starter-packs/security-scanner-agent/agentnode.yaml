manifest_version: "0.2"
package_id: "security-scanner-agent"
package_type: "agent"
name: "Security Scanner Agent"
publisher: "agentnode"
version: "2.1.0"
summary: "Run comprehensive security scan: SAST, dependency vulnerabilities, secret detection."
description: |
  Perform security scan by running static analysis, checking for CVEs, and detecting secrets.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "security_scanner_agent.agent"

capabilities:
  tools:
    - name: "security_scanner"
      capability_id: "security_scanner"
      description: "Run comprehensive security scan: SAST, dependency vulnerabilities, secret detection."
      entrypoint: "security_scanner_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "security_scanner_agent.agent:run"
  goal: "Perform security scan by running static analysis, checking for CVEs, and detecting secrets."
  system_prompt: |
    You are a security scanning engineer.
    Run comprehensive security analysis: static code analysis (SAST),
    dependency vulnerability scanning, secret detection, and
    configuration review. Produce a prioritized findings report.
  tool_access:
    allowed_packages:
      - "code-linter-pack"
      - "secret-scanner-pack"
      - "security-audit-pack"
      - "web-search-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "security", "scanning", "compliance", "devops"]
categories: ["ops"]
