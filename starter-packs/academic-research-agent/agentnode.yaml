manifest_version: "0.2"
package_id: "academic-research-agent"
package_type: "agent"
name: "Academic Research Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Search academic papers on arXiv and Google Scholar, extract citations, and produce a literature review."
description: |
  Conduct academic literature research by searching paper databases, extracting PDFs, collecting citations, and summarizing findings into a literature review.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "academic_research_agent.agent"

capabilities:
  tools:
    - name: "academic_research"
      capability_id: "academic_research"
      description: "Search academic papers on arXiv and Google Scholar, extract citations, and produce a literature review."
      entrypoint: "academic_research_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "academic_research_agent.agent:run"
  goal: "Conduct academic literature research by searching paper databases, extracting PDFs, collecting citations, and summarizing findings into a literature review."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "research", "academic", "papers"]
categories: ["research"]
