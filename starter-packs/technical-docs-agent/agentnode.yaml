manifest_version: "0.2"
package_id: "technical-docs-agent"
package_type: "agent"
name: "Technical Documentation Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Generate API documentation and developer guides from source code, including examples and type signatures."
description: |
  Generate comprehensive technical documentation from source code by analyzing code structure, extracting docstrings and type signatures, and producing formatted developer guides.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "technical_docs_agent.agent"

capabilities:
  tools:
    - name: "technical_documentation"
      capability_id: "technical_documentation"
      description: "Generate API documentation and developer guides from source code, including examples and type signatures."
      entrypoint: "technical_docs_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "technical_docs_agent.agent:run"
  goal: "Generate comprehensive technical documentation from source code by analyzing code structure, extracting docstrings and type signatures, and producing formatted developer guides."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "docs", "api", "code", "developer"]
categories: ["content"]
