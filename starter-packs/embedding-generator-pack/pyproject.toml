[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "embedding-generator-pack"
version = "1.0.0"
description = "Generate text embeddings using sentence-transformers models."
requires-python = ">=3.10"
license = "MIT"
dependencies = ["sentence-transformers>=2.0"]

[tool.setuptools.packages.find]
where = ["src"]
