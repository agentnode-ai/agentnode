manifest_version: "0.2"
package_id: "blog-writer-agent"
package_type: "agent"
name: "Blog Writer Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Research a topic and write an SEO-optimized blog post with structure and keywords."
description: |
  Write a blog post by researching the topic, analyzing competitors, and generating content.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "blog_writer_agent.agent"

capabilities:
  tools:
    - name: "blog_writer"
      capability_id: "blog_writer"
      description: "Research a topic and write an SEO-optimized blog post with structure and keywords."
      entrypoint: "blog_writer_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "blog_writer_agent.agent:run"
  goal: "Write a blog post by researching the topic, analyzing competitors, and generating content."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "content", "blog", "seo", "writing"]
categories: ["content"]
