manifest_version: "0.2"
package_id: "csv-analyst-agent"
package_type: "agent"
name: "CSV Analyst Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Upload a CSV, detect patterns and anomalies, generate visualizations, and produce an analysis report."
description: |
  Analyze a CSV file by detecting data types, finding patterns and anomalies, generating visualizations, and producing a structured analysis report.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "csv_analyst_agent.agent"

capabilities:
  tools:
    - name: "csv_analysis_workflow"
      capability_id: "csv_analysis_workflow"
      description: "Upload a CSV, detect patterns and anomalies, generate visualizations, and produce an analysis report."
      entrypoint: "csv_analyst_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "csv_analyst_agent.agent:run"
  goal: "Analyze a CSV file by detecting data types, finding patterns and anomalies, generating visualizations, and producing a structured analysis report."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "csv", "data", "analytics", "visualization"]
categories: ["data"]
