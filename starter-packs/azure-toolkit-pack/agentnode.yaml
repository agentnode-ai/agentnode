manifest_version: "0.1"
package_id: "azure-toolkit-pack"
package_type: "toolpack"
name: "Azure Toolkit Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Azure toolkit for managing resource groups and VMs"
description: "Azure toolkit for managing resource groups and VMs"
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "azure_toolkit_pack.tool"

capabilities:
  tools:
    - name: "code_analysis"
      capability_id: "code_analysis"
      description: "Manage Azure resources."
      input_schema:
        type: "object"
        properties:
          operation: {type: "string"}
          subscription_id: {type: "string", default: ""}
          resource_group: {type: "string", default: ""}
        required: ['operation']
  resources: []
  prompts: []

tags: ["azure", "toolkit"]
categories: ["development"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "azure-identity>=1.15"
    - "azure-mgmt-compute>=30.0"
    - "azure-mgmt-resource>=23.0"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["code_analysis"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "code_analysis"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/azure-toolkit-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
