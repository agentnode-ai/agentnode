manifest_version: "0.2"
package_id: "competitive-intel-agent"
package_type: "agent"
name: "Competitive Intelligence Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Analyze competitors by scraping their web presence, monitoring news, and producing a competitive analysis report."
description: |
  Gather competitive intelligence by searching the web, extracting content from competitor pages, aggregating news, and summarizing into a competitive analysis.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "competitive_intel_agent.agent"

capabilities:
  tools:
    - name: "competitive_intelligence"
      capability_id: "competitive_intelligence"
      description: "Analyze competitors by scraping their web presence, monitoring news, and producing a competitive analysis report."
      entrypoint: "competitive_intel_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "competitive_intel_agent.agent:run"
  goal: "Gather competitive intelligence by searching the web, extracting content from competitor pages, aggregating news, and summarizing into a competitive analysis."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "research", "competitive", "business"]
categories: ["research"]
