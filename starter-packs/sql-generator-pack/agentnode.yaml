manifest_version: "0.2"
package_id: "sql-generator-pack"
package_type: "toolpack"
name: "SQL Generator Pack"
publisher: "agentnode"
version: "1.1.0"
summary: "Generate and format SQL queries from natural language descriptions."
runtime: python
description: "Generate and format SQL queries from natural language descriptions."
entrypoint: "sql_generator_pack.tool"

capabilities:
  tools:
    - name: "generate_sql"
      capability_id: "sql_generation"
      entrypoint: "sql_generator_pack.tool:generate"
      description: "Generate SQL from a natural language description."
      input_schema:
        type: "object"
        properties:
          description: {type: "string", description: "Natural language description"}
          schema: {type: "string", description: "Optional database schema"}
          dialect: {type: "string", description: "SQL dialect (postgresql, mysql, sqlite, mssql)"}
        required: ["description"]

    - name: "format_sql"
      capability_id: "sql_generation"
      entrypoint: "sql_generator_pack.tool:format_sql"
      description: "Format and validate an existing SQL query."
      input_schema:
        type: "object"
        properties:
          sql: {type: "string", description: "Raw SQL query to format"}
          dialect: {type: "string", description: "SQL dialect for formatting hints"}
        required: ["sql"]

tags: ["sql", "generator", "database"]
categories: ["data-analysis"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "sqlparse>=0.5"

permissions:
  network: {level: "none"}
  filesystem: {level: "workspace_write"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}
