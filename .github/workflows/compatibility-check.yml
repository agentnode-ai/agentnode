name: Compatibility Smoke Test

on:
  push:
    branches: [main]
    paths:
      - sdk/agentnode_sdk/**
      - sdk/scripts/**
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install openai httpx
          pip install -e sdk/

      - name: Run compatibility smoke test
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python sdk/scripts/ci_smoke_test.py
