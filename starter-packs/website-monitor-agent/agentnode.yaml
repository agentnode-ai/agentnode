manifest_version: "0.2"
package_id: "website-monitor-agent"
package_type: "agent"
name: "Website Monitor Agent"
publisher: "agentnode"
version: "2.1.1"
summary: "Monitor websites for content changes, downtime, and extract current state."
description: |
  Monitor target websites by checking content, comparing snapshots, and reporting status.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "website_monitor_agent.agent"

capabilities:
  tools:
    - name: "website_monitor"
      capability_id: "website_monitor"
      description: "Monitor websites for content changes, downtime, and extract current state."
      entrypoint: "website_monitor_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "website_monitor_agent.agent:run"
  goal: "Monitor target websites by checking content, comparing snapshots, and reporting status."
  system_prompt: |
    You are a website monitoring specialist.
    Check websites for availability, detect content changes, measure
    response times, and extract current page state. Produce monitoring
    reports with change diffs and status history.
  tool_access:
    allowed_packages:
      - "document-summarizer-pack"
      - "web-search-pack"
      - "webpage-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "monitoring", "website", "alerts", "devops"]
categories: ["ops"]
