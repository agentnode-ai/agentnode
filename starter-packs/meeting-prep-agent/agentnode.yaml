manifest_version: "0.2"
package_id: "meeting-prep-agent"
package_type: "agent"
name: "Meeting Prep Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Prepare for meetings by researching attendees, summarizing relevant docs, and generating an agenda with talking points."
description: |
  Prepare for a meeting by researching attendees and topics, summarizing relevant documents, and generating a structured agenda with talking points and action items.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "meeting_prep_agent.agent"

capabilities:
  tools:
    - name: "meeting_preparation"
      capability_id: "meeting_preparation"
      description: "Prepare for meetings by researching attendees, summarizing relevant docs, and generating an agenda with talking points."
      entrypoint: "meeting_prep_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "meeting_prep_agent.agent:run"
  goal: "Prepare for a meeting by researching attendees and topics, summarizing relevant documents, and generating a structured agenda with talking points and action items."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "meeting", "productivity", "preparation"]
categories: ["productivity"]
