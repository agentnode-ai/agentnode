manifest_version: "0.2"
package_id: "news-digest-agent"
package_type: "agent"
name: "News Digest Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Aggregate news from multiple sources on a topic, summarize key stories, and optionally translate for multilingual digests."
description: |
  Create a news digest by aggregating articles from multiple sources, summarizing key stories, and optionally translating content for multilingual audiences.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "news_digest_agent.agent"

capabilities:
  tools:
    - name: "news_digest"
      capability_id: "news_digest"
      description: "Aggregate news from multiple sources on a topic, summarize key stories, and optionally translate for multilingual digests."
      entrypoint: "news_digest_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "news_digest_agent.agent:run"
  goal: "Create a news digest by aggregating articles from multiple sources, summarizing key stories, and optionally translating content for multilingual audiences."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "news", "digest", "multilingual"]
categories: ["research"]
