manifest_version: "0.2"
package_id: "security-scanner-agent"
package_type: "agent"
name: "Security Scanner Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Run a comprehensive security scan on a codebase: SAST, dependency vulnerabilities, secret detection, and compliance check."
description: |
  Perform a security scan by running static analysis, checking dependencies for CVEs, detecting leaked secrets, verifying compliance, and producing a consolidated security report.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "security_scanner_agent.agent"

capabilities:
  tools:
    - name: "security_scanning"
      capability_id: "security_scanning"
      description: "Run a comprehensive security scan on a codebase: SAST, dependency vulnerabilities, secret detection, and compliance check."
      entrypoint: "security_scanner_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "security_scanner_agent.agent:run"
  goal: "Perform a security scan by running static analysis, checking dependencies for CVEs, detecting leaked secrets, verifying compliance, and producing a consolidated security report."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "security", "scanning", "compliance", "devops"]
categories: ["ops"]
