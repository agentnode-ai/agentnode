manifest_version: "0.2"
package_id: "project-planner-agent"
package_type: "agent"
name: "Project Planner Agent"
publisher: "agentnode"
version: "2.0.0"
summary: "Break down a project goal into user stories, tasks, and milestones."
description: |
  Plan a project by decomposing into user stories, tasks, and milestones.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "project_planner_agent.agent"

capabilities:
  tools:
    - name: "project_planner"
      capability_id: "project_planner"
      description: "Break down a project goal into user stories, tasks, and milestones."
      entrypoint: "project_planner_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "project_planner_agent.agent:run"
  goal: "Plan a project by decomposing into user stories, tasks, and milestones."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "project", "planning", "agile", "productivity"]
categories: ["productivity"]
