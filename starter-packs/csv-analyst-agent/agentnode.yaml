manifest_version: "0.2"
package_id: "csv-analyst-agent"
package_type: "agent"
name: "CSV Analyst Agent"
publisher: "agentnode"
version: "2.1.1"
summary: "Upload a CSV, detect patterns and anomalies, and produce an analysis report."
description: |
  Analyze a CSV by detecting data types, finding patterns, and producing an analysis report.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "csv_analyst_agent.agent"

capabilities:
  tools:
    - name: "csv_analyst"
      capability_id: "csv_analyst"
      description: "Upload a CSV, detect patterns and anomalies, and produce an analysis report."
      entrypoint: "csv_analyst_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "csv_analyst_agent.agent:run"
  goal: "Analyze a CSV by detecting data types, finding patterns, and producing an analysis report."
  system_prompt: |
    You are a data analyst specializing in tabular data.
    Load CSV files, detect column types and patterns, identify anomalies
    and outliers, compute summary statistics, and produce an analysis
    report with visualizable insights.
  tool_access:
    allowed_packages:
      - "csv-analyzer-pack"
      - "document-summarizer-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "none"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "csv", "data", "analytics"]
categories: ["data"]
