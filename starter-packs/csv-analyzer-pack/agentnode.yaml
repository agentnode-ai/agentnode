manifest_version: "0.2"
package_id: "csv-analyzer-pack"
package_type: "toolpack"
name: "CSV Analyzer Pack"
publisher: "agentnode"
version: "1.1.0"
summary: "Analyze CSV files with pandas: statistics, filtering, and column inspection."
runtime: python
description: "Analyze CSV files with pandas: statistics, filtering, and column inspection."
entrypoint: "csv_analyzer_pack.tool"

capabilities:
  tools:
    - name: "describe_csv"
      capability_id: "csv_analysis"
      entrypoint: "csv_analyzer_pack.tool:describe"
      description: "Return summary statistics for a CSV file."
      input_schema:
        type: "object"
        properties:
          file_path: {type: "string", description: "Path to CSV file"}
        required: ["file_path"]

    - name: "head_csv"
      capability_id: "csv_analysis"
      entrypoint: "csv_analyzer_pack.tool:head"
      description: "Return the first N rows of a CSV file."
      input_schema:
        type: "object"
        properties:
          file_path: {type: "string", description: "Path to CSV file"}
          n: {type: "integer", description: "Number of rows to return"}
        required: ["file_path"]

    - name: "columns_csv"
      capability_id: "csv_analysis"
      entrypoint: "csv_analyzer_pack.tool:columns"
      description: "Return detailed column information for a CSV file."
      input_schema:
        type: "object"
        properties:
          file_path: {type: "string", description: "Path to CSV file"}
        required: ["file_path"]

    - name: "filter_csv"
      capability_id: "data_cleaning"
      entrypoint: "csv_analyzer_pack.tool:filter_rows"
      description: "Filter rows by a column condition."
      input_schema:
        type: "object"
        properties:
          file_path: {type: "string", description: "Path to CSV file"}
          column: {type: "string", description: "Column name to filter on"}
          value: {type: "string", description: "Value to compare against"}
          operator: {type: "string", description: "Comparison operator (==, !=, >, <, >=, <=)"}
        required: ["file_path", "column", "value"]

verification:
  cases:
    - name: "describe_test_csv"
      tool: "describe_csv"
      input:
        file_path: "/workspace/fixtures/test_data.csv"
      expected:
        return_type: "dict"
        required_keys: ["operation", "rows", "columns", "statistics"]
    - name: "filter_by_city"
      tool: "filter_csv"
      input:
        file_path: "/workspace/fixtures/test_data.csv"
        column: "city"
        value: "Berlin"
        operator: "=="
      expected:
        return_type: "dict"
        required_keys: ["operation", "matched_rows", "rows"]

tags: ["csv", "analyzer", "pandas", "data"]
categories: ["data-analysis"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "pandas>=2.0"
