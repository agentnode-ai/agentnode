manifest_version: "0.2"
package_id: "dependency-audit-agent"
package_type: "agent"
name: "Dependency Audit Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Scan project dependencies for known vulnerabilities, outdated versions, license issues, and leaked secrets."
description: |
  Audit project dependencies by scanning for known CVEs, checking for outdated packages, verifying license compatibility, and detecting leaked secrets in configuration.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "dependency_audit_agent.agent"

capabilities:
  tools:
    - name: "dependency_audit"
      capability_id: "dependency_audit"
      description: "Scan project dependencies for known vulnerabilities, outdated versions, license issues, and leaked secrets."
      entrypoint: "dependency_audit_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "dependency_audit_agent.agent:run"
  goal: "Audit project dependencies by scanning for known CVEs, checking for outdated packages, verifying license compatibility, and detecting leaked secrets in configuration."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "security", "dependencies", "audit", "devops"]
categories: ["development"]
