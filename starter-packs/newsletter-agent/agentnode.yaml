manifest_version: "0.2"
package_id: "newsletter-agent"
package_type: "agent"
name: "Newsletter Agent"
publisher: "agentnode"
version: "1.0.0"
summary: "Curate top stories on a topic, summarize them, and draft a ready-to-send newsletter email."
description: |
  Create a newsletter by aggregating top stories on a topic, summarizing each article, and drafting a formatted newsletter email ready for distribution.

  This agent uses AgentNode's full skill registry to dynamically discover
  and install the capabilities it needs at runtime.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "newsletter_agent.agent"

capabilities:
  tools:
    - name: "newsletter_creation"
      capability_id: "newsletter_creation"
      description: "Curate top stories on a topic, summarize them, and draft a ready-to-send newsletter email."
      entrypoint: "newsletter_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
          context:
            type: "object"
            description: "Optional context and parameters"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
          error:
            type: "string"
  resources: []
  prompts: []

agent:
  entrypoint: "newsletter_agent.agent:run"
  goal: "Create a newsletter by aggregating top stories on a topic, summarizing each article, and drafting a formatted newsletter email ready for distribution."
  tool_access:
    allowed_packages: []
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "none"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "newsletter", "email", "content", "curation"]
categories: ["content"]
