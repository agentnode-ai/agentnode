manifest_version: "0.2"
package_id: "data-pipeline-agent"
package_type: "agent"
name: "Data Pipeline Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Build and run a data pipeline: load from CSV/JSON, clean and transform, then output."
description: |
  Execute a data pipeline by loading, cleaning, and transforming data to a target format.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "data_pipeline_agent.agent"

capabilities:
  tools:
    - name: "data_pipeline"
      capability_id: "data_pipeline"
      description: "Build and run a data pipeline: load from CSV/JSON, clean and transform, then output."
      entrypoint: "data_pipeline_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "data_pipeline_agent.agent:run"
  goal: "Execute a data pipeline by loading, cleaning, and transforming data to a target format."
  tier: "llm_plus_tools"
  llm:
    required: true
  system_prompt: |
    You are a data pipeline engineer.
    Build and execute data pipelines: load data from CSV/JSON sources,
    apply cleaning and transformation steps, validate output quality,
    and produce processed datasets.
  tool_access:
    allowed_packages:
      - "csv-analyzer-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: etl_pipeline
        goal: "Build a data pipeline to process customer transaction logs"
        expected:
          required_keys: ['source_file', 'done']
          done: true
      - name: log_pipeline
        goal: "Create a pipeline to transform and filter server access logs"
        expected:
          required_keys: ['source_file', 'done']
          done: true

  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "restricted"
  filesystem:
    level: "workspace_write"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "etl", "data", "pipeline", "transformation"]
categories: ["data"]
