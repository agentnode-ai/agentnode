manifest_version: "0.2"
package_id: "log-investigator-agent"
package_type: "agent"
name: "Log Investigator Agent"
publisher: "agentnode"
version: "2.1.1"
summary: "Parse log files, identify errors and anomalies, correlate events, and produce a report."
description: |
  Investigate logs by parsing entries, identifying error patterns, and generating an incident report.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "log_investigator_agent.agent"

capabilities:
  tools:
    - name: "log_investigator"
      capability_id: "log_investigator"
      description: "Parse log files, identify errors and anomalies, correlate events, and produce a report."
      entrypoint: "log_investigator_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "log_investigator_agent.agent:run"
  goal: "Investigate logs by parsing entries, identifying error patterns, and generating an incident report."
  system_prompt: |
    You are a log analysis and incident investigation specialist.
    Parse log files across formats, identify errors and anomalies,
    correlate events across time windows, and produce a root cause
    analysis report with timeline.
  tool_access:
    allowed_packages:
      - "csv-analyzer-pack"
      - "document-summarizer-pack"
      - "json-processor-pack"
      - "web-search-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "logs", "debugging", "incident", "devops"]
categories: ["data"]
