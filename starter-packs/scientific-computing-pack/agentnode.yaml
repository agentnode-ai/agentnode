manifest_version: "0.1"
package_id: "scientific-computing-pack"
package_type: "toolpack"
name: "Scientific Computing Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Scientific computing operations: statistics, linear regression, FFT, and linear algebra."
description: "Scientific computing operations: statistics, linear regression, FFT, and linear algebra."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "scientific_computing_pack.tool"

capabilities:
  tools:
    - name: "statistics_analysis"
      capability_id: "statistics_analysis"
      description: "Perform scientific computing operations."
      input_schema:
        type: "object"
        properties:
          operation: {type: "string"}
          data: {type: "array"}
        required: ['operation', 'data']
  resources: []
  prompts: []

tags: ["scientific", "computing"]
categories: ["data-analysis"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "numpy>=1.24"
    - "scipy>=1.10"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["statistics_analysis"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "statistics_analysis"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/scientific-computing-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
