manifest_version: "0.1"
package_id: "news-aggregator-pack"
package_type: "toolpack"
name: "News Aggregator Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Aggregate and parse news from RSS/Atom feeds."
description: "Aggregate and parse news from RSS/Atom feeds."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "news_aggregator_pack.tool"

capabilities:
  tools:
    - name: "web_search"
      capability_id: "web_search"
      description: "Aggregate news articles from RSS/Atom feeds."
      input_schema:
        type: "object"
        properties:
          feeds: {type: "array"}
          topic: {type: "string", default: ""}
          limit: {type: "integer", default: 20}
  resources: []
  prompts: []

tags: ["news", "aggregator"]
categories: ["web-and-browsing"]

compatibility:
  frameworks: ["langchain", "crewai", "generic"]
  python: ">=3.10"
  dependencies:
    - "feedparser>=6.0"
    - "httpx>=0.25"

permissions:
  network: {level: "unrestricted"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["web_search"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "web_search"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/news-aggregator-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
