[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "slack-connector-pack"
version = "1.0.0"
description = "Send messages, read history, and manage Slack channels."
requires-python = ">=3.10"
license = "MIT"
dependencies = ["slack-sdk>=3.25"]

[tool.setuptools.packages.find]
where = ["src"]
