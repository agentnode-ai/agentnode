manifest_version: "0.2"
package_id: "ci-cd-agent"
package_type: "agent"
name: "CI/CD Agent"
publisher: "agentnode"
version: "2.1.0"
summary: "Analyze project structure and generate CI/CD pipeline configuration."
description: |
  Orchestrate a CI/CD pipeline by analyzing code, running checks, and generating config.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "ci_cd_agent.agent"

capabilities:
  tools:
    - name: "ci_cd"
      capability_id: "ci_cd"
      description: "Analyze project structure and generate CI/CD pipeline configuration."
      entrypoint: "ci_cd_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "ci_cd_agent.agent:run"
  goal: "Orchestrate a CI/CD pipeline by analyzing code, running checks, and generating config."
  system_prompt: |
    You are a CI/CD pipeline engineer.
    Analyze the project structure, detect the language/framework, and
    generate appropriate CI/CD configuration (GitHub Actions, GitLab CI,
    etc.). Include build, test, lint, and deploy stages.
  tool_access:
    allowed_packages:
      - "code-linter-pack"
      - "code-refactor-pack"
      - "document-summarizer-pack"
      - "test-generator-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "limited_subprocess"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "cicd", "devops", "deployment", "docker"]
categories: ["development"]
