manifest_version: "0.1"
package_id: "markdown-notes-pack"
package_type: "toolpack"
name: "Markdown Notes Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Manage a local vault of Markdown notes with YAML frontmatter and tag support."
description: "Manage a local vault of Markdown notes with YAML frontmatter and tag support."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "markdown_notes_pack.tool"

capabilities:
  tools:
    - name: "document_parsing"
      capability_id: "document_parsing"
      description: "Manage Markdown notes in a local vault directory."
      input_schema:
        type: "object"
        properties:
          operation: {type: "string"}
          vault_path: {type: "string"}
        required: ['operation', 'vault_path']
  resources: []
  prompts: []

tags: ["markdown", "notes"]
categories: ["document-processing"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["document_parsing"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "document_parsing"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/markdown-notes-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
