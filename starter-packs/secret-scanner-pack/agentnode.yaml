manifest_version: "0.1"
package_id: "secret-scanner-pack"
package_type: "toolpack"
name: "Secret Scanner Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Scan code and directories for leaked secrets, API keys, and tokens."
description: "Scan code and directories for leaked secrets, API keys, and tokens."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "secret_scanner_pack.tool"

capabilities:
  tools:
    - name: "code_analysis"
      capability_id: "code_analysis"
      description: "Scan code or a directory for secret patterns."
      input_schema:
        type: "object"
        properties:
          code: {type: "string"}
          directory: {type: "string"}
  resources: []
  prompts: []

tags: ["secret", "scanner"]
categories: ["development"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["code_analysis"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "code_analysis"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/secret-scanner-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
