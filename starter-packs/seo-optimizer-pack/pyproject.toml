[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "seo-optimizer-pack"
version = "1.0.0"
description = "Analyze HTML pages for SEO issues and get actionable recommendations."
requires-python = ">=3.10"
license = "MIT"
dependencies = ["beautifulsoup4>=4.12"]

[tool.setuptools.packages.find]
where = ["src"]
