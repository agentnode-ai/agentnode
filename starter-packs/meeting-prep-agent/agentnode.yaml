manifest_version: "0.2"
package_id: "meeting-prep-agent"
package_type: "agent"
name: "Meeting Prep Agent"
publisher: "agentnode"
version: "2.1.2"
summary: "Prepare for meetings by researching attendees, summarizing docs, and generating an agenda."
description: |
  Prepare for a meeting by researching topics and attendees, then generating an agenda.

  Uses AgentContext contract v1: calls tools via context.run_tool()
  with real data flow between steps and structured output synthesis.

runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "meeting_prep_agent.agent"

capabilities:
  tools:
    - name: "meeting_prep"
      capability_id: "meeting_prep"
      description: "Prepare for meetings by researching attendees, summarizing docs, and generating an agenda."
      entrypoint: "meeting_prep_agent.agent:run"
      input_schema:
        type: "object"
        properties:
          goal:
            type: "string"
            description: "The objective for the agent"
        required: ["goal"]
      output_schema:
        type: "object"
        properties:
          result:
            type: "object"
          done:
            type: "boolean"
  resources: []
  prompts: []

agent:
  entrypoint: "meeting_prep_agent.agent:run"
  goal: "Prepare for a meeting by researching topics and attendees, then generating an agenda."
  tier: "llm_plus_tools"
  llm:
    required: true
  system_prompt: |
    You are a meeting preparation assistant.
    Research meeting attendees, summarize relevant documents and prior
    communications, identify key discussion topics, and generate a
    structured agenda with talking points.
  tool_access:
    allowed_packages:
      - "document-summarizer-pack"
      - "web-search-pack"
      - "webpage-extractor-pack"
  limits:
    max_iterations: 10
    max_tool_calls: 50
    max_runtime_seconds: 300
  termination:
    stop_on_final_answer: true
    stop_on_consecutive_errors: 3
  verification:
    cases:
      - name: board_meeting
        goal: "Prepare materials for a quarterly board meeting on company strategy"
        expected:
          required_keys: ['agenda', 'done']
          done: true
      - name: client_call
        goal: "Prepare briefing notes for a client discovery call about cloud migration"
        expected:
          required_keys: ['agenda', 'done']
          done: true

  isolation: "thread"
  state:
    persistence: "none"

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies: []

permissions:
  network:
    level: "unrestricted"
  filesystem:
    level: "workspace_read"
  code_execution:
    level: "none"
  data_access:
    level: "input_only"
  user_approval:
    required: "never"

tags: ["agent", "meeting", "productivity", "preparation"]
categories: ["productivity"]
