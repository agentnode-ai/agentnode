manifest_version: "0.1"
package_id: "seo-optimizer-pack"
package_type: "toolpack"
name: "Seo Optimizer Pack"
publisher: "agentnode"
version: "1.0.0"
summary: "Analyze HTML pages for SEO issues and get actionable recommendations."
description: "Analyze HTML pages for SEO issues and get actionable recommendations."
runtime: "python"
install_mode: "package"
hosting_type: "agentnode_hosted"
entrypoint: "seo_optimizer_pack.tool"

capabilities:
  tools:
    - name: "webpage_extraction"
      capability_id: "webpage_extraction"
      description: "Analyze HTML content for SEO issues."
      input_schema:
        type: "object"
        properties:
          html: {type: "string"}
          url: {type: "string"}
          keyword: {type: "string", default: ""}
  resources: []
  prompts: []

tags: ["seo", "optimizer"]
categories: ["web-and-browsing"]

compatibility:
  frameworks: ["generic"]
  python: ">=3.10"
  dependencies:
    - "beautifulsoup4>=4.12"

permissions:
  network: {level: "none"}
  filesystem: {level: "none"}
  code_execution: {level: "none"}
  data_access: {level: "input_only"}
  user_approval: {required: "never"}

upgrade_roles: ["webpage_extraction"]
recommended_for:
  - agent_type: "general-assistant"
    missing_capability: "webpage_extraction"

install_strategy: "local"
fallback_behavior: "skip"
policy_requirements:
  min_trust_level: "unverified"
  requires_approval: false

security:
  signature: null
  provenance:
    source_repo: null
    commit: null
    build_system: null

support:
  homepage: "https://agentnode.net/packages/seo-optimizer-pack"
  issues: "https://github.com/agentnode-ai/agentnode/issues"

deprecation_policy: "6-months-notice"
